<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình xem Flipbook Hayzine</title>
    <style>
        /* Tối ưu hóa không gian hiển thị */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e26; /* Nền tối giúp nổi bật Flipbook */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Tránh cuộn trang thừa */
        }

        /* Thanh tiêu đề */
        header {
            padding: 15px;
            text-align: center;
            background: linear-gradient(90deg, #2c3e50, #000000);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Container chứa Iframe */
        .content-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        /* Tinh chỉnh Iframe từ mã nhúng của bạn */
        .fp-iframe {
            border: 2px solid #444 !important;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 95%;
            max-width: 1200px;
            height: 90vh; /* Chiếm 90% chiều cao màn hình */
            background-color: #fff;
        }

        /* Hiệu ứng phản hồi cho di động */
        @media (max-width: 768px) {
            .fp-iframe {
                width: 100%;
                height: 80vh;
                border: none !important;
            }
            h1 { font-size: 1rem; }
        }

        footer {
            padding: 8px;
            text-align: center;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.2);
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>📚 Tài Liệu Trực Tuyến</h1>
    </header>

    <div class="content-area">
        <iframe 
            src="https://heyzine.com/flip-book/738e6f56c1.html" 
            class="fp-iframe" 
            allowfullscreen="allowfullscreen" 
            allow="clipboard-write" 
            scrolling="no">
        </iframe>
    </div>

    <footer>
        Hỗ trợ hiển thị tốt nhất trên trình duyệt Chrome và Safari
    </footer>

</body>
</html>
